<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Parking Areas</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">🚗 Smart<span>Parking</span></a><div class="nav-links"><a th:href="@{/owner/dashboard}">Dashboard</a><a th:href="@{/logout}" class="btn-logout">Logout</a></div></nav>
<div class="layout">
    <div class="sidebar"><div class="sidebar-section">Menu</div><div class="sidebar-menu">
        <a th:href="@{/owner/dashboard}"><span>📊</span> Dashboard</a>
        <a th:href="@{/owner/parking}" class="active"><span>🅿️</span> My Parking Areas</a>
        <a th:href="@{/owner/parking/add}"><span>➕</span> Add Parking</a>
        <a th:href="@{/owner/bookings}"><span>📅</span> Bookings</a>
    </div></div>
    <div class="main-content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">
            <h2 class="page-title" style="margin:0;">My Parking Areas</h2>
            <a th:href="@{/owner/parking/add}" class="btn btn-primary">+ Add New</a>
        </div>
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Name</th><th>Address</th><th>City</th><th>Slots</th><th>Price/hr</th><th>Vehicles</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="a,s : ${areas}">
                            <td th:text="${s.index+1}"></td>
                            <td><strong th:text="${a.name}"></strong></td>
                            <td th:text="${a.address}"></td>
                            <td th:text="${a.city}"></td>
                            <td th:text="${a.availableSlots}+'/'+${a.totalSlots}"></td>
                            <td th:text="'Rs.' + ${a.pricePerHour}"></td>
                            <td th:text="${a.supportedVehicleTypes}"></td>
                            <td>
                                <span class="badge badge-active"           th:if="${a.status.name() == 'ACTIVE'}"           th:text="${a.status}"></span>
                                <span class="badge badge-inactive"         th:if="${a.status.name() == 'INACTIVE'}"         th:text="${a.status}"></span>
                                <span class="badge badge-suspended"        th:if="${a.status.name() == 'SUSPENDED'}"        th:text="${a.status}"></span>
                                <span class="badge badge-pending_approval" th:if="${a.status.name() == 'PENDING_APPROVAL'}" th:text="'Pending Approval'"></span>
                            </td>
                            <td style="white-space:nowrap;">
                                <form th:if="${a.status.name() == 'ACTIVE' or a.status.name() == 'INACTIVE'}"
                                      th:action="@{/owner/parking/{id}/toggle(id=${a.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-warning btn-sm" th:if="${a.status.name() == 'ACTIVE'}">Deactivate</button>
                                    <button class="btn btn-success btn-sm" th:if="${a.status.name() == 'INACTIVE'}">Activate</button>
                                </form>
                                <a th:href="@{/owner/parking/{id}/reviews(id=${a.id})}" class="btn btn-info btn-sm">Reviews</a>
                                <span th:if="${a.status.name() == 'PENDING_APPROVAL'}" style="font-size:12px;color:#888;"> Awaiting approval</span>
                                <span th:if="${a.status.name() == 'SUSPENDED'}" style="font-size:12px;color:#e74c3c;"> Suspended by admin</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(areas)}">
                            <td colspan="9" style="text-align:center;padding:40px;color:#888;">
                                No parking areas yet. <a th:href="@{/owner/parking/add}" style="color:#00d4ff;">Add one</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
