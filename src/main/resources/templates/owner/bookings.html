<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Manage Bookings</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">🚗 Smart<span>Parking</span></a><div class="nav-links"><a th:href="@{/owner/dashboard}">Dashboard</a><a th:href="@{/logout}" class="btn-logout">Logout</a></div></nav>
<div class="layout">
    <div class="sidebar"><div class="sidebar-section">Menu</div><div class="sidebar-menu">
        <a th:href="@{/owner/dashboard}"><span>📊</span> Dashboard</a>
        <a th:href="@{/owner/parking}"><span>🅿️</span> My Parking Areas</a>
        <a th:href="@{/owner/parking/add}"><span>➕</span> Add Parking</a>
        <a th:href="@{/owner/bookings}" class="active"><span>📅</span> Bookings</a>
    </div></div>
    <div class="main-content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <h2 class="page-title">Manage Bookings</h2>
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Code</th><th>User</th><th>Parking</th><th>Vehicle</th><th>Entry</th><th>Slot</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="b : ${bookings}">
                            <td><strong th:text="${b.bookingCode}"></strong></td>
                            <td>
                                <div th:text="${b.user.fullName}" style="font-weight:600;"></div>
                                <div th:text="${b.user.phone}" style="font-size:12px;color:#888;"></div>
                            </td>
                            <td th:text="${b.parkingArea.name}"></td>
                            <td>
                                <div th:text="${b.vehicleNumber}"></div>
                                <div th:text="${b.vehicleType}" style="font-size:12px;color:#888;"></div>
                            </td>
                            <td th:text="${#temporals.format(b.plannedEntryTime,'dd MMM HH:mm')}"></td>
                            <td th:text="${b.slotNumber}"></td>
                            <td>
                                <span th:if="${b.finalAmount != null}" th:text="'Rs.' + ${b.finalAmount}"></span>
                                <span th:if="${b.finalAmount == null}" th:text="'Rs.' + ${b.estimatedAmount}"></span>
                            </td>
                            <td>
                                <span class="badge badge-pending"   th:if="${b.status.name() == 'PENDING'}"   th:text="${b.status}"></span>
                                <span class="badge badge-confirmed" th:if="${b.status.name() == 'CONFIRMED'}" th:text="${b.status}"></span>
                                <span class="badge badge-active"    th:if="${b.status.name() == 'ACTIVE'}"    th:text="${b.status}"></span>
                                <span class="badge badge-completed" th:if="${b.status.name() == 'COMPLETED'}" th:text="${b.status}"></span>
                                <span class="badge badge-cancelled" th:if="${b.status.name() == 'CANCELLED'}" th:text="${b.status}"></span>
                                <span class="badge badge-rejected"  th:if="${b.status.name() == 'REJECTED'}"  th:text="${b.status}"></span>
                            </td>
                            <td style="white-space:nowrap;">
                                <form th:if="${b.status.name() == 'PENDING'}"
                                      th:action="@{/owner/bookings/{id}/confirm(id=${b.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-success btn-sm">Confirm</button>
                                </form>
                                <button th:if="${b.status.name() == 'PENDING'}" class="btn btn-danger btn-sm"
                                        onclick="showReject(this)" th:data-id="${b.id}">Reject</button>
                                <form th:if="${b.status.name() == 'CONFIRMED'}"
                                      th:action="@{/owner/bookings/{id}/entry(id=${b.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-info btn-sm">Entry</button>
                                </form>
                                <form th:if="${b.status.name() == 'ACTIVE'}"
                                      th:action="@{/owner/bookings/{id}/exit(id=${b.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-warning btn-sm">Exit</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="9" style="text-align:center;padding:40px;color:#888;">No bookings yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Reject Modal -->
<div class="modal-overlay" id="rejectModal">
    <div class="modal">
        <h3>Reject Booking</h3>
        <form id="rejectForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Reason *</label>
                <textarea name="reason" class="form-control" rows="3" placeholder="Enter rejection reason..." required></textarea>
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-danger" style="flex:1;">Reject</button>
                <button type="button" class="btn btn-info" onclick="closeReject()">Cancel</button>
            </div>
        </form>
    </div>
</div>
<script>
function showReject(btn) {
    document.getElementById('rejectForm').action = '/owner/bookings/' + btn.getAttribute('data-id') + '/reject';
    document.getElementById('rejectModal').classList.add('open');
}
function closeReject() { document.getElementById('rejectModal').classList.remove('open'); }
</script>
</body>
</html>
