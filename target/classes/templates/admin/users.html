<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Manage Users</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">🚗 Smart<span>Parking</span></a><div class="nav-links"><span style="color:#aaa;">👑 Admin</span><a th:href="@{/logout}" class="btn-logout">Logout</a></div></nav>
<div class="layout">
    <div class="sidebar"><div class="sidebar-section">Admin Panel</div><div class="sidebar-menu">
        <a th:href="@{/admin/dashboard}"><span>📊</span> Dashboard</a>
        <a th:href="@{/admin/users}" class="active"><span>👤</span> Users</a>
        <a th:href="@{/admin/owners}"><span>🏢</span> Owners</a>
        <a th:href="@{/admin/parking}"><span>🅿️</span> Parking Areas</a>
        <a th:href="@{/admin/bookings}"><span>📅</span> All Bookings</a>
    </div></div>
    <div class="main-content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <h2 class="page-title">Manage Users</h2>
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Vehicle</th><th>Joined</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody>
                        <tr th:each="u,s : ${users}">
                            <td th:text="${s.index+1}"></td>
                            <td><strong th:text="${u.fullName}"></strong></td>
                            <td th:text="${u.email}"></td>
                            <td th:text="${u.phone}"></td>
                            <td>
                                <span th:if="${u.vehicleNumber != null}" th:text="${u.vehicleNumber}"></span>
                                <span th:if="${u.vehicleNumber == null}">-</span>
                                <span th:if="${u.vehicleType != null}" th:text="' (' + ${u.vehicleType} + ')'"></span>
                            </td>
                            <td th:text="${u.createdAt != null} ? ${#temporals.format(u.createdAt,'dd MMM yyyy')} : '-'"></td>
                            <td>
                                <span class="badge badge-active"    th:if="${u.enabled}">Active</span>
                                <span class="badge badge-cancelled" th:if="${!u.enabled}">Disabled</span>
                            </td>
                            <td>
                                <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-danger btn-sm"  th:if="${u.enabled}">Disable</button>
                                    <button class="btn btn-success btn-sm" th:if="${!u.enabled}">Enable</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="8" style="text-align:center;padding:30px;color:#888;">No users yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
