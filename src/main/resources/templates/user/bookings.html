<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Bookings</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/}">🚗 Smart<span>Parking</span></a>
    <div class="nav-links"><a th:href="@{/user/dashboard}">Dashboard</a><a th:href="@{/logout}" class="btn-logout">Logout</a></div>
</nav>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-section">Menu</div>
        <div class="sidebar-menu">
            <a th:href="@{/user/dashboard}"><span>📊</span> Dashboard</a>
            <a th:href="@{/parking/search}"><span>🔍</span> Find Parking</a>
            <a th:href="@{/user/bookings}" class="active"><span>📅</span> My Bookings</a>
        </div>
    </div>
    <div class="main-content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <h2 class="page-title">My Bookings</h2>
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Code</th><th>Parking</th><th>Vehicle</th><th>Entry</th><th>Exit</th><th>Slot</th><th>Amount</th><th>Status</th><th>Payment</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${bookings}">
                            <td><strong th:text="${b.bookingCode}"></strong></td>
                            <td>
                                <div th:text="${b.parkingArea.name}" style="font-weight:600;"></div>
                                <div th:text="${b.parkingArea.city}" style="font-size:12px;color:#888;"></div>
                            </td>
                            <td>
                                <div th:text="${b.vehicleNumber}"></div>
                                <div th:text="${b.vehicleType}" style="font-size:12px;color:#888;"></div>
                            </td>
                            <td th:text="${#temporals.format(b.plannedEntryTime,'dd MMM HH:mm')}"></td>
                            <td th:text="${#temporals.format(b.plannedExitTime,'dd MMM HH:mm')}"></td>
                            <td th:text="${b.slotNumber}"></td>
                            <td>
                                <span th:if="${b.finalAmount != null}" th:text="'Rs.' + ${b.finalAmount}"></span>
                                <span th:if="${b.finalAmount == null}" th:text="'Rs.' + ${b.estimatedAmount}"></span>
                            </td>
                            <td>
                                <span class="badge badge-pending"   th:if="${b.status.name() == 'PENDING'}"   th:text="${b.status}"></span>
                                <span class="badge badge-confirmed" th:if="${b.status.name() == 'CONFIRMED'}" th:text="${b.status}"></span>
                                <span class="badge badge-active"    th:if="${b.status.name() == 'ACTIVE'}"    th:text="${b.status}"></span>
                                <span class="badge badge-completed" th:if="${b.status.name() == 'COMPLETED'}" th:text="${b.status}"></span>
                                <span class="badge badge-cancelled" th:if="${b.status.name() == 'CANCELLED'}" th:text="${b.status}"></span>
                                <span class="badge badge-rejected"  th:if="${b.status.name() == 'REJECTED'}"  th:text="${b.status}"></span>
                            </td>
                            <td>
                                <span class="badge badge-pending" th:if="${b.paymentStatus.name() == 'PENDING'}" th:text="${b.paymentStatus}"></span>
                                <span class="badge badge-active"  th:if="${b.paymentStatus.name() == 'PAID'}"    th:text="${b.paymentStatus}"></span>
                            </td>
                            <td style="white-space:nowrap;">
                                <form th:if="${b.status.name() == 'PENDING' or b.status.name() == 'CONFIRMED'}"
                                      th:action="@{/user/bookings/{id}/cancel(id=${b.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-danger btn-sm" onclick="return confirm('Cancel?')">Cancel</button>
                                </form>
                                <form th:if="${b.status.name() == 'COMPLETED' and b.paymentStatus.name() == 'PENDING'}"
                                      th:action="@{/user/bookings/{id}/pay(id=${b.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-success btn-sm">Pay Now</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="10" style="text-align:center;padding:40px;color:#888;">
                                No bookings yet. <a th:href="@{/parking/search}" style="color:#00d4ff;">Find parking</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
