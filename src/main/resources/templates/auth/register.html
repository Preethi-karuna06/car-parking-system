<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Register - Smart Parking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
    <div class="auth-card" style="max-width:520px;">
        <div style="text-align:center;margin-bottom:22px;">
            <div style="font-size:42px;">🚗</div>
            <div class="auth-title">Create Account</div>
            <div class="auth-subtitle">Join Smart Parking today</div>
        </div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <form action="/register" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>I am a</label>
                <select name="role" class="form-control" id="roleSelect" onchange="toggleVehicle(this.value)">
                    <option value="USER">Car Owner (I want to park)</option>
                    <option value="OWNER">Parking Area Owner (I provide parking)</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="fullName" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="text" name="phone" class="form-control" placeholder="10-digit" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" class="form-control" required/>
            </div>
            <div class="form-group">
                <label>Password * (min 6 characters)</label>
                <input type="password" name="password" class="form-control" minlength="6" required/>
            </div>
            <div id="vehicleSection">
                <div class="form-row">
                    <div class="form-group">
                        <label>Vehicle Number</label>
                        <input type="text" name="vehicleNumber" class="form-control" placeholder="TN01AB1234"/>
                    </div>
                    <div class="form-group">
                        <label>Vehicle Type</label>
                        <select name="vehicleType" class="form-control">
                            <option value="CAR">Car</option>
                            <option value="BIKE">Bike</option>
                            <option value="TRUCK">Truck</option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Create Account →</button>
        </form>
        <div class="auth-link">Already have an account? <a th:href="@{/login}">Login here</a></div>
    </div>
</div>
<script>
function toggleVehicle(role) {
    document.getElementById('vehicleSection').style.display = role === 'USER' ? 'block' : 'none';
}
</script>
</body>
</html>
