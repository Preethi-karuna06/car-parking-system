<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Login - Smart Parking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:25px;">
            <div style="font-size:48px;">🚗</div>
            <div class="auth-title">Welcome Back</div>
            <div class="auth-subtitle">Login to Smart Parking</div>
        </div>
        <div th:if="${param.error}" class="alert alert-error">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert alert-success">Logged out successfully.</div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <form action="/login" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="username" class="form-control" placeholder="your@email.com" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Password" required/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Login →</button>
        </form>
        <div class="auth-link">Don't have an account? <a th:href="@{/register}">Register here</a></div>
        <div class="auth-link"><a th:href="@{/}" style="color:#888;">← Back to Home</a></div>
        <div style="margin-top:20px;padding:14px;background:#f8f9fa;border-radius:8px;font-size:12px;color:#666;">
            <strong>Demo:</strong> admin@smartparking.com / admin123
        </div>
    </div>
</div>
</body>
</html>
